name: Release DEBs

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debs:
    name: Build DEBs (${{ matrix.distro.name }})
    runs-on: ${{ matrix.distro.runner }}

    strategy:
      fail-fast: false
      matrix:
        distro:
          - name: ubuntu20.04
            runner: ubuntu-20.04
          - name: ubuntu24.04
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps (core + optional features + build tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config g++ \
            libzmq3-dev libmsgpack-dev \
            libflac-dev \
            libturbojpeg0-dev \
            libavahi-client-dev \
            dpkg-dev fakeroot

      - name: Configure (Release, enable features)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DMAGPIE_WITH_AUDIO=ON \
            -DMAGPIE_WITH_VIDEO=ON \
            -DMAGPIE_WITH_DISCOVERY=ON \
            -DMAGPIE_BUILD_TESTS=OFF \
            -DMAGPIE_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build

      - name: Package (.deb via CPack)
        run: |
          cd build
          cpack -G DEB

      - name: Rename DEBs to include distro
        shell: bash
        run: |
          set -euo pipefail
          cd build

          # Determine version string
          # - Tag builds: v0.5.0 -> 0.5.0
          # - Manual builds: use "snapshot"
          ref="${GITHUB_REF_NAME:-snapshot}"
          if [[ "$ref" == v* ]]; then
            ver="${ref#v}"
          else
            ver="snapshot"
          fi

          for f in *.deb; do
            # Example input: magpie-0.5.0-Linux-core.deb
            base="$(basename "$f")"
            new="${base/-Linux-/-${{ matrix.distro.name }}-}"
            # Also normalize prefix to magpie_<ver> style if you prefer; keeping your current prefix
            mv -v "$f" "$new"
          done

      - name: Upload DEBs as workflow artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro.name }}
          path: build/*.deb
          if-no-files-found: error

      - name: Upload DEBs to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
          fail_on_unmatched_files: true
